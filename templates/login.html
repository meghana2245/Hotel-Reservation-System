<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | OmniStay Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-pattern {
            background-color: #0f172a;
            background-image: radial-gradient(ellipse at 20% 50%, rgba(245,158,11,0.08) 0%, transparent 60%),
                              radial-gradient(ellipse at 80% 20%, rgba(99,102,241,0.08) 0%, transparent 50%);
        }
        .glass-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .input-field {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            color: white;
            transition: all 0.2s ease;
        }
        .input-field:focus {
            background: rgba(255,255,255,0.1);
            border-color: #f59e0b;
            outline: none;
            box-shadow: 0 0 0 3px rgba(245,158,11,0.15);
        }
        .input-field::placeholder { color: rgba(255,255,255,0.3); }
        .input-field option { background: #1e293b; color: white; }
        .btn-login {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            transition: all 0.25s ease;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            box-shadow: 0 8px 25px rgba(245,158,11,0.35);
            transform: translateY(-1px);
        }
        .btn-login:active { transform: translateY(0); }
    </style>
</head>
<body class="bg-pattern min-h-screen flex items-center justify-center px-4">

    <div class="w-full max-w-md">
        <!-- Logo / Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 mb-4">
                <svg class="w-12 h-12 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-white tracking-tight">OmniStay</h1>
            <p class="text-slate-400 mt-1 text-sm">Sign in to continue</p>
        </div>

        <!-- Login Card -->
        <div class="glass-card rounded-2xl p-8 shadow-2xl">

            <!-- Flash messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                    <div class="mb-5 px-4 py-3 rounded-lg text-sm font-medium
                        {% if category == 'error' %}bg-red-500/15 text-red-400 border border-red-500/25
                        {% else %}bg-green-500/15 text-green-400 border border-green-500/25{% endif %}">
                        {{ message }}
                    </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login') }}" class="space-y-5">

                <!-- Role -->
                <div>
                    <label for="role" class="block text-xs font-semibold text-slate-400 uppercase tracking-widest mb-2">Role</label>
                    <select id="role" name="role" required
                        class="input-field w-full px-4 py-3 rounded-xl text-sm font-medium appearance-none cursor-pointer">
                        <option value="" disabled selected>Select your role…</option>
                        <option value="Admin">Admin</option>
                        <option value="Staff">Staff</option>
                    </select>
                </div>

                <!-- Username / Staff ID -->
                <div>
                    <label for="username" class="block text-xs font-semibold text-slate-400 uppercase tracking-widest mb-2">Username / Staff ID</label>
                    <input type="text" id="username" name="username" required
                        placeholder="Enter your username or ID"
                        class="input-field w-full px-4 py-3 rounded-xl text-sm">
                </div>

                <!-- Password -->
                <div>
                    <label for="password" class="block text-xs font-semibold text-slate-400 uppercase tracking-widest mb-2">Password</label>
                    <input type="password" id="password" name="password" required
                        placeholder="••••••••"
                        class="input-field w-full px-4 py-3 rounded-xl text-sm">
                </div>

                <!-- Submit -->
                <button type="submit" id="login-btn"
                    class="btn-login w-full py-3 rounded-xl text-white font-semibold text-sm mt-2 cursor-pointer">
                    Sign In
                </button>
            </form>
        </div>

        <p class="text-center text-slate-600 text-xs mt-6 flex items-center justify-center gap-2">
            <svg class="w-4 h-4 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
            </svg>
            &copy; 2026 OmniStay
        </p>
    </div>

</body>
</html>
