{% extends "base.html" %}
{% block title %}Edit Room{% endblock %}
{% block page_title %}Edit Room{% endblock %}

{% block content %}
<div class="flex items-center gap-2 text-sm text-slate-500 mb-6">
    <a href="{{ url_for('rooms') }}" class="hover:text-amber-500 transition-colors">Rooms</a>
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
    </svg>
    <span class="text-slate-800 font-medium">Edit — Room {{ room.RoomNumber }}</span>
</div>

<div class="max-w-2xl">
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8">
        <div class="flex items-center justify-between mb-1">
            <h2 class="text-xl font-bold text-slate-800">Edit Room</h2>
            <span class="text-xs font-mono bg-slate-50 text-slate-500 px-2.5 py-1 rounded-lg">#{{ room.RoomID }}</span>
        </div>
        <p class="text-sm text-slate-500 mb-7">Update the room's details below.</p>

        <form method="POST" action="{{ url_for('edit_room', id=room.RoomID) }}" class="space-y-5">

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="room_number" class="block text-xs font-semibold text-slate-500 uppercase tracking-widest mb-1.5">
                        Room Number <span class="text-red-400">*</span>
                    </label>
                    <input type="text" id="room_number" name="room_number" required
                           value="{{ room.RoomNumber }}"
                           class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent transition-all">
                </div>
                <div>
                    <label for="floor" class="block text-xs font-semibold text-slate-500 uppercase tracking-widest mb-1.5">
                        Floor <span class="text-red-400">*</span>
                    </label>
                    <input type="number" id="floor" name="floor" required min="1"
                           value="{{ room.Floor }}"
                           class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent transition-all">
                </div>
            </div>

            <div>
                <label for="category_id" class="block text-xs font-semibold text-slate-500 uppercase tracking-widest mb-1.5">
                    Room Category <span class="text-red-400">*</span>
                </label>
                <select id="category_id" name="category_id" required
                        class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent transition-all bg-white cursor-pointer">
                    {% for cat in categories %}
                    <option value="{{ cat.CategoryID }}" {% if cat.CategoryID == room.CategoryID %}selected{% endif %}>
                        {{ cat.CategoryName }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label for="status" class="block text-xs font-semibold text-slate-500 uppercase tracking-widest mb-1.5">
                    Status
                </label>
                <select id="status" name="status"
                        class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent transition-all bg-white cursor-pointer">
                    <option value="Available"   {% if room.Status == 'Available'   %}selected{% endif %}>Available</option>
                    <option value="Occupied"    {% if room.Status == 'Occupied'    %}selected{% endif %}>Occupied</option>
                    <option value="Maintenance" {% if room.Status == 'Maintenance' %}selected{% endif %}>Maintenance</option>
                </select>
            </div>

            <div class="flex items-center gap-3 pt-2">
                <button type="submit"
                        class="bg-amber-500 hover:bg-amber-400 text-white font-semibold text-sm px-6 py-2.5 rounded-xl shadow-sm shadow-amber-500/20 transition-all hover:shadow-md hover:-translate-y-0.5 cursor-pointer">
                    Save Changes
                </button>
                <button type="reset"
                        class="bg-slate-50 hover:bg-slate-200 text-slate-600 font-semibold text-sm px-5 py-2.5 rounded-xl transition-all cursor-pointer">
                    Reset
                </button>
                <a href="{{ url_for('rooms') }}" class="text-sm text-slate-500 hover:text-slate-700 font-medium transition-colors px-4 py-2.5">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
