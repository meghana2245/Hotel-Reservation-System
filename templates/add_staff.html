{% extends "base.html" %}
{% block title %}Add Staff Member{% endblock %}
{% block page_title %}Add Staff Member{% endblock %}

{% block content %}
<div class="flex items-center gap-2 text-sm text-slate-500 mb-6">
    <a href="{{ url_for('staff') }}" class="hover:text-amber-500 transition-colors">Staff</a>
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
    </svg>
    <span class="text-slate-800 font-medium">Add New Staff Member</span>
</div>

<div class="max-w-2xl">
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8">
        <h2 class="text-xl font-bold text-slate-800 mb-1">New Staff Member</h2>
        <p class="text-sm text-slate-500 mb-7">Add a new employee to the hotel's staff directory.</p>

        <form method="POST" action="{{ url_for('add_staff') }}" class="space-y-5">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="first_name" class="block text-xs font-semibold text-slate-500 uppercase tracking-widest mb-1.5">
                        First Name <span class="text-red-400">*</span>
                    </label>
                    <input type="text" id="first_name" name="first_name" required placeholder="e.g. Riya"
                           class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent transition-all">
                </div>
                <div>
                    <label for="last_name" class="block text-xs font-semibold text-slate-500 uppercase tracking-widest mb-1.5">
                        Last Name <span class="text-red-400">*</span>
                    </label>
                    <input type="text" id="last_name" name="last_name" required placeholder="e.g. Sharma"
                           class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent transition-all">
                </div>
            </div>

            <div>
                <label for="role" class="block text-xs font-semibold text-slate-500 uppercase tracking-widest mb-1.5">
                    Role <span class="text-red-400">*</span>
                </label>
                <input type="text" id="role" name="role" required placeholder="e.g. Receptionist, Housekeeping, Manager"
                       class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent transition-all">
            </div>

            <div>
                <label for="contact_number" class="block text-xs font-semibold text-slate-500 uppercase tracking-widest mb-1.5">
                    Contact Number
                </label>
                <input type="tel" id="contact_number" name="contact_number" placeholder="e.g. +91 98765 43210"
                       class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent transition-all">
            </div>

            <div class="flex items-center gap-3 pt-2">
                <button type="submit"
                        class="bg-amber-500 hover:bg-amber-400 text-white font-semibold text-sm px-6 py-2.5 rounded-xl shadow-sm shadow-amber-500/30 transition-all hover:shadow-md hover:-translate-y-0.5 cursor-pointer">
                    Add Staff Member
                </button>
                <button type="reset"
                        class="bg-slate-50 hover:bg-slate-200 text-slate-600 font-semibold text-sm px-5 py-2.5 rounded-xl transition-all cursor-pointer">
                    Reset
                </button>
                <a href="{{ url_for('staff') }}" class="text-sm text-slate-500 hover:text-slate-700 font-medium transition-colors px-4 py-2.5">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
